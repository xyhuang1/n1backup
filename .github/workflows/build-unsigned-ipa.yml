# 构建「未签名 IPA」—— 牛蛙助手 / 超级签名重签
# 仅 SFTP（Citadel 静态），无动态 framework，重签后可正常安装

name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "N1PhotoBackup/**"
      - "project.yml"
      - "Info.plist"
      - ".github/workflows/build-unsigned-ipa.yml"

jobs:
  build:
    name: Compile unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_NAME: N1PhotoBackup
      SCHEME: N1PhotoBackup
      BUNDLE_ID: com.n1backup.photobackup
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          for p in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode.app
          do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              break
            fi
          done
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
            xcodegen --version
          fi

      - name: Generate project
        run: |
          xcodegen generate
          test -d N1PhotoBackup.xcodeproj
          grep -A2 Citadel project.yml || true

      - name: Resolve Swift packages (Citadel)
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild -resolvePackageDependencies \
            -project N1PhotoBackup.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath build/SourcePackages \
            2>&1 | tee build/resolve.log
          echo "✓ Packages resolved"

      - name: Build (no code sign)
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          if ! xcodebuild build \
            -project N1PhotoBackup.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            -clonedSourcePackagesDirPath build/SourcePackages \
            -skipPackageUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build/build.log
          then
            echo "========== COMPILER ERRORS =========="
            grep -E "error:|fatal error:" build/build.log | head -80 || true
            exit 65
          fi

      - name: Pack IPA
        run: |
          set -euo pipefail

          APP_PATH=$(find build/DerivedData -type d -name "${APP_NAME}.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 ${APP_NAME}.app"
            find build/DerivedData -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"

          BIN="$APP_PATH/${APP_NAME}"

          # 去掉签名痕迹
          find "$APP_PATH" \( -name "_CodeSignature" -o -name "CodeResources" \) -prune -exec rm -rf {} + 2>/dev/null || true

          if command -v otool >/dev/null 2>&1; then
            echo "=== otool -L ==="
            otool -L "$BIN" | head -40
            # 不得出现第三方 @rpath/*.framework（Citadel 应为静态）
            if otool -L "$BIN" | grep -E '@rpath/.*\.framework' | grep -v '/System/' >/dev/null; then
              echo "❌ 仍存在 @rpath framework 依赖，重签后可能装不上："
              otool -L "$BIN" | grep '@rpath'
              # 尝试嵌入兜底
              FRAMEWORKS_DIR="$APP_PATH/Frameworks"
              mkdir -p "$FRAMEWORKS_DIR"
              while IFS= read -r fw; do
                name=$(basename "$fw")
                [ -d "$FRAMEWORKS_DIR/$name" ] || cp -R "$fw" "$FRAMEWORKS_DIR/"
              done < <(find build/DerivedData -type d -name "*.framework" \
                \( -path "*/PackageFrameworks/*" -o -path "*/Build/Products/*" \) 2>/dev/null \
                | grep -v "${APP_NAME}.app" || true)
              missing=0
              while read -r line; do
                fw=$(echo "$line" | sed -n 's/.*@rpath\/\([^/]*\.framework\).*/\1/p')
                if [ -n "$fw" ] && [ ! -d "$FRAMEWORKS_DIR/$fw" ]; then
                  echo "仍缺: $fw"
                  missing=1
                fi
              done < <(otool -L "$BIN" | awk '{print $1}')
              if [ "$missing" -ne 0 ]; then
                exit 1
              fi
            else
              echo "✓ 无第三方 @rpath framework（静态链接）"
            fi
          fi

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          rm -f "${APP_NAME}-unsigned.ipa"
          zip -ry "${APP_NAME}-unsigned.ipa" Payload
          ls -lh "${APP_NAME}-unsigned.ipa"
          ditto -c -k --sequesterRsrc --keepParent Payload/"${APP_NAME}.app" "${APP_NAME}.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: N1PhotoBackup-unsigned-ipa
          path: |
            build/N1PhotoBackup-unsigned.ipa
            build/N1PhotoBackup.app.zip
            build/build.log
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          {
            echo "### 未签名 IPA（v1.5.0 · 仅 SFTP）"
            echo ""
            echo "1. 下载 **N1PhotoBackup-unsigned-ipa**"
            echo "2. 解压得到 \`N1PhotoBackup-unsigned.ipa\`"
            echo "3. 牛蛙助手导入证书签名安装"
            echo "4. Bundle ID：\`${BUNDLE_ID}\`"
            echo "5. iOS **17+**；协议：**仅 SFTP**（Citadel 静态）"
          } >> "$GITHUB_STEP_SUMMARY"
