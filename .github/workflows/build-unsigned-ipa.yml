# 构建「未签名 IPA」—— 给你自己用 牛蛙助手 / 超级签名 / 爱思 等重签
# 不需要上传任何苹果证书到 GitHub
#
# 使用：Actions → Build Unsigned IPA → Run workflow → 下载 Artifact

name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "N1PhotoBackup/**"
      - "project.yml"
      - "Info.plist"
      - ".github/workflows/build-unsigned-ipa.yml"

jobs:
  build:
    name: Compile unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_NAME: N1PhotoBackup
      SCHEME: N1PhotoBackup
      # 重签时多数工具会改 Bundle ID；这里先用固定值
      BUNDLE_ID: com.n1backup.photobackup
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          for p in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode.app
          do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
            xcodegen --version
          fi

      - name: Generate project
        run: |
          xcodegen generate
          test -d N1PhotoBackup.xcodeproj
          echo "=== project.yml packages (expect AMSMB2 4.0.3 + Citadel 0.12.1) ==="
          grep -A2 -E 'AMSMB2|Citadel|exactVersion|embed' project.yml || true

      - name: Resolve Swift packages (AMSMB2 + Citadel)
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild -resolvePackageDependencies \
            -project N1PhotoBackup.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath build/SourcePackages \
            2>&1 | tee build/resolve.log
          echo "✓ Packages resolved"
          ls build/SourcePackages/checkouts 2>/dev/null || true

      - name: Build (no code sign)
        run: |
          set -euo pipefail
          mkdir -p build

          # 关闭签名，仅编译 arm64 真机包（牛蛙等工具会再签）
          # 已链接 AMSMB2(SMB 动态) + Citadel(SFTP 静态)，WebDAV/FTP 系统自带
          set -o pipefail
          if ! xcodebuild build \
            -project N1PhotoBackup.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            -clonedSourcePackagesDirPath build/SourcePackages \
            -skipPackageUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build/build.log
          then
            echo ""
            echo "========== COMPILER ERRORS =========="
            grep -E "error:|fatal error:" build/build.log | head -80 || true
            echo "========== END ERRORS =========="
            exit 65
          fi

      - name: Pack IPA
        run: |
          set -euo pipefail

          # 查找编译出的 .app
          APP_PATH=$(find build/DerivedData -type d -name "${APP_NAME}.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 ${APP_NAME}.app，目录如下："
            find build/DerivedData -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"

          # ---- 关键：把 SPM 动态库塞进 .app/Frameworks ----
          # AMSMB2 默认以 dynamic framework 产出；CODE_SIGNING_ALLOWED=NO 时
          # Xcode 常常不执行 Embed Frameworks，导致重签后启动秒退（dyld missing）。
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"
          mkdir -p "$FRAMEWORKS_DIR"

          # 1) 已由 Xcode 嵌入的（若有）
          # 2) PackageFrameworks 产物
          while IFS= read -r fw; do
            name=$(basename "$fw")
            if [ ! -d "$FRAMEWORKS_DIR/$name" ]; then
              echo "Embedding $fw"
              cp -R "$fw" "$FRAMEWORKS_DIR/"
            fi
          done < <(find build/DerivedData -type d -name "*.framework" \
            \( -path "*/PackageFrameworks/*" -o -path "*/Build/Products/*" \) 2>/dev/null \
            | grep -v "${APP_NAME}.app" || true)

          # 去掉签名痕迹，方便重签工具整体重签
          find "$APP_PATH" \( -name "_CodeSignature" -o -name "CodeResources" \) -prune -exec rm -rf {} + 2>/dev/null || true
          find "$FRAMEWORKS_DIR" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "=== Frameworks in app ==="
          ls -la "$FRAMEWORKS_DIR" || true

          # 校验：主二进制若引用 @rpath/*.framework，则 Frameworks 里必须存在
          BIN="$APP_PATH/${APP_NAME}"
          if command -v otool >/dev/null 2>&1; then
            echo "=== otool -L (first 40 lines) ==="
            otool -L "$BIN" | head -40
            missing=0
            while read -r line; do
              # 例如: @rpath/AMSMB2.framework/AMSMB2
              fw=$(echo "$line" | sed -n 's/.*@rpath\/\([^/]*\.framework\).*/\1/p')
              if [ -n "$fw" ] && [ ! -d "$FRAMEWORKS_DIR/$fw" ]; then
                echo "❌ 缺少嵌入框架: $fw （来自: $line）"
                missing=1
              fi
            done < <(otool -L "$BIN" | awk '{print $1}')
            if [ "$missing" -ne 0 ]; then
              echo "Frameworks 不完整，拒绝打包（否则装到手机必秒退）"
              echo "PackageFrameworks 目录内容："
              find build/DerivedData -type d -name "*.framework" | head -50
              exit 1
            fi
            echo "✓ 所有 @rpath framework 均已嵌入"
          fi

          # 标准 IPA 结构：Payload/xxx.app
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          rm -f "${APP_NAME}-unsigned.ipa"
          # zip 即为 ipa（-y 保留符号链接）
          zip -ry "${APP_NAME}-unsigned.ipa" Payload
          ls -lh "${APP_NAME}-unsigned.ipa"

          # 再打一份 .app.zip 方便部分工具导入
          ditto -c -k --sequesterRsrc --keepParent Payload/"${APP_NAME}.app" "${APP_NAME}.app.zip"
          ls -lh "${APP_NAME}.app.zip"

          echo "=== Payload app layout ==="
          find Payload/"${APP_NAME}.app" -maxdepth 2 -type d
          ls -la Payload/"${APP_NAME}.app/Frameworks" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: N1PhotoBackup-unsigned-ipa
          path: |
            build/N1PhotoBackup-unsigned.ipa
            build/N1PhotoBackup.app.zip
            build/build.log
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          {
            echo "### 未签名 IPA 已生成（v1.3.0 · 已嵌入动态 Framework）"
            echo ""
            echo "1. 下载 Artifact **N1PhotoBackup-unsigned-ipa**"
            echo "2. 解压得到 \`N1PhotoBackup-unsigned.ipa\`"
            echo "3. 用 **牛蛙助手** / 其他超级签名工具导入并签名安装"
            echo "4. Bundle ID 默认：\`${BUNDLE_ID}\`（签名时可被工具修改）"
            echo "5. 最低系统：**iOS 17**"
            echo "6. 依赖：**AMSMB2 4.0.3**（SMB，动态 embed）+ **Citadel 0.12.1**（SFTP，静态）"
            echo ""
            echo "> 若仍闪退：确认设备 ≥ iOS 17；签名时勾选「嵌入依赖 / 重签 Frameworks」。"
          } >> "$GITHUB_STEP_SUMMARY"
