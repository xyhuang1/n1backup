# 构建「未签名 IPA」—— 给你自己用 牛蛙助手 / 超级签名 / 爱思 等重签
# 不需要上传任何苹果证书到 GitHub
#
# 使用：Actions → Build Unsigned IPA → Run workflow → 下载 Artifact

name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "N1PhotoBackup/**"
      - "project.yml"
      - "Info.plist"
      - ".github/workflows/build-unsigned-ipa.yml"

jobs:
  build:
    name: Compile unsigned IPA
    runs-on: macos-14
    timeout-minutes: 45

    env:
      APP_NAME: N1PhotoBackup
      SCHEME: N1PhotoBackup
      # 重签时多数工具会改 Bundle ID；这里先用固定值
      BUNDLE_ID: com.n1backup.photobackup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          for p in \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode_15.4.app \
            /Applications/Xcode.app
          do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              break
            fi
          done
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen --version

      - name: Generate project
        run: |
          xcodegen generate
          test -d N1PhotoBackup.xcodeproj

      - name: Build (no code sign)
        run: |
          set -euo pipefail
          mkdir -p build

          # 关闭签名，仅编译 arm64 真机包（牛蛙等工具会再签）
          xcodebuild build \
            -project N1PhotoBackup.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            2>&1 | tee build/build.log

      - name: Pack IPA
        run: |
          set -euo pipefail

          # 查找编译出的 .app
          APP_PATH=$(find build/DerivedData -type d -name "${APP_NAME}.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "找不到 ${APP_NAME}.app，目录如下："
            find build/DerivedData -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          ls -la "$APP_PATH"

          # 标准 IPA 结构：Payload/xxx.app
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/

          cd build
          rm -f "${APP_NAME}-unsigned.ipa"
          # zip 即为 ipa
          zip -r "${APP_NAME}-unsigned.ipa" Payload
          ls -lh "${APP_NAME}-unsigned.ipa"

          # 再打一份 .app.zip 方便部分工具导入
          ditto -c -k --sequesterRsrc --keepParent Payload/"${APP_NAME}.app" "${APP_NAME}.app.zip"
          ls -lh "${APP_NAME}.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: N1PhotoBackup-unsigned-ipa
          path: |
            build/N1PhotoBackup-unsigned.ipa
            build/N1PhotoBackup.app.zip
            build/build.log
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          {
            echo "### 未签名 IPA 已生成"
            echo ""
            echo "1. 下载 Artifact **N1PhotoBackup-unsigned-ipa**"
            echo "2. 解压得到 \`N1PhotoBackup-unsigned.ipa\`"
            echo "3. 用 **牛蛙助手** / 其他超级签名工具导入并签名安装"
            echo "4. Bundle ID 默认：\`${BUNDLE_ID}\`（签名时可被工具修改）"
            echo ""
            echo "> 未签名包不能直接安装，必须重签。"
          } >> "$GITHUB_STEP_SUMMARY"
