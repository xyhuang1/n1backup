# 在 N1 (iStoreOS) 上用 Docker 快速起一个 WebDAV，映射 USB 备份目录。
# 用法：
#   1. 确认 USB 挂载路径（如 /mnt/sda1），并 mkdir -p /mnt/sda1/PhoneBackup
#   2. 修改下面 PASSWORD 与 volumes 路径
#   3. docker compose -f docker-webdav-compose.yml up -d
#
# App 设置示例：
#   主机: 192.168.x.x
#   端口: 8080
#   HTTPS: 关
#   用户: backup
#   密码: 下面设置的密码
#   基础路径: /

services:
  webdav:
    image: bytemark/webdav
    container_name: n1-photo-webdav
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      AUTH_TYPE: Basic
      USERNAME: backup
      PASSWORD: "请改成强密码"
    volumes:
      # 把主机 USB 目录映射进容器
      - /mnt/sda1/PhoneBackup:/var/lib/dav
