# XcodeGen — SFTP（Citadel 静态）+ WebDAV（系统 URLSession）
# 生成: xcodegen generate
#
# Citadel + NIO/Crypto 均为静态链接，链进主二进制，无需 embed framework。
# WebDAV 无第三方依赖。未签名 IPA 重签后即可安装。

name: N1PhotoBackup

options:
  bundleIdPrefix: com.n1backup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    exactVersion: 0.12.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: "10"
    MARKETING_VERSION: "1.7.0"
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

targets:
  N1PhotoBackup:
    type: application
    platform: iOS
    sources:
      - path: N1PhotoBackup
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Citadel
        product: Citadel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.n1backup.photobackup
        PRODUCT_NAME: N1PhotoBackup
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CODE_SIGN_ENTITLEMENTS: N1PhotoBackup.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        OTHER_LDFLAGS: "$(inherited) -ObjC"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

schemes:
  N1PhotoBackup:
    build:
      targets:
        N1PhotoBackup: all
    run:
      config: Debug
    archive:
      config: Release
