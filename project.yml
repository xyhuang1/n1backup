# XcodeGen 工程 —— 已内置 SMB / SFTP 依赖，无需再手动加包
# 生成: xcodegen generate

name: N1PhotoBackup

options:
  bundleIdPrefix: com.n1backup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

# 正式接入第三方库（编译时自动下载）
packages:
  AMSMB2:
    url: https://github.com/amosavian/AMSMB2
    from: 4.0.0
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.9.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.2.0"
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CLANG_ENABLE_MODULES: YES

configs:
  Debug: debug
  Release: release

targets:
  N1PhotoBackup:
    type: application
    platform: iOS
    sources:
      - path: N1PhotoBackup
        excludes:
          - "**/.DS_Store"
    dependencies:
      # AMSMB2 是动态 framework，必须 embed，否则 dyld 找不到秒退
      - package: AMSMB2
        product: AMSMB2
        embed: true
      # Citadel（以及 swift-nio / swift-crypto）是静态库，已在主二进制中，
      # 不需要 embed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.n1backup.photobackup
        PRODUCT_NAME: N1PhotoBackup
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CODE_SIGN_ENTITLEMENTS: N1PhotoBackup.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        # 部分 SPM 包需要
        OTHER_LDFLAGS: "$(inherited) -ObjC"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

schemes:
  N1PhotoBackup:
    build:
      targets:
        N1PhotoBackup: all
    run:
      config: Debug
    archive:
      config: Release
