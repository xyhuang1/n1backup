# XcodeGen — SMB(AMSMB2 静态) / SFTP(Citadel 静态) 已内置
# 生成: xcodegen generate
#
# 关键：AMSMB2 上游默认 type: .dynamic，未签名 IPA 重签后常因
# @rpath/AMSMB2.framework 缺失而安装失败或秒退。
# 本仓库用 ThirdParty/AMSMB2 本地包，强制静态链接进主二进制，与 Citadel 一致。

name: N1PhotoBackup

options:
  bundleIdPrefix: com.n1backup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # 本地 vendored 静态库（勿改回 remote dynamic）
  AMSMB2:
    path: ThirdParty/AMSMB2
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    exactVersion: 0.12.1

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: "5"
    MARKETING_VERSION: "1.4.0"
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

targets:
  N1PhotoBackup:
    type: application
    platform: iOS
    sources:
      - path: N1PhotoBackup
        excludes:
          - "**/.DS_Store"
    dependencies:
      # 静态：不要 embed（embed 动态 framework 才需要）
      - package: AMSMB2
        product: AMSMB2
      - package: Citadel
        product: Citadel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.n1backup.photobackup
        PRODUCT_NAME: N1PhotoBackup
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CODE_SIGN_ENTITLEMENTS: N1PhotoBackup.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        OTHER_LDFLAGS: "$(inherited) -ObjC"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"

schemes:
  N1PhotoBackup:
    build:
      targets:
        N1PhotoBackup: all
    run:
      config: Debug
    archive:
      config: Release
